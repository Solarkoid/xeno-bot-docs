{# Giscus comments embed - uses GitHub Discussions for comments #}
<div id="comments" class="md-comments" style="margin-top:18px;">
  <h2 class="md-comments__title">Comments</h2>
  <div class="md-comments__note" style="margin-bottom:8px;color:var(--md-typeset-meta);font-size:0.95em;">Discuss this page via GitHub Discussions (Giscus). You may need to sign in to comment.</div>
  <div class="md-comments__widget">
    <script src="https://giscus.app/client.js"
            data-repo="devvyyxyz/xeno-bot-docs"
            data-repo-id=""
            data-category=""
            data-category-id=""
            data-mapping="pathname"
            data-reactions-enabled="1"
            data-emit-metadata="0"
            data-theme="github-light"
            crossorigin="anonymous"
            async>
    </script>
  </div>
</div>
